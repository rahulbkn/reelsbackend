<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Reels Backend</title>
		<style>
			:root {
				color-scheme: dark;
				font-family:
					Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
					"Segoe UI", sans-serif;
				background: #050507;
				color: #fff;
			}

			* {
				box-sizing: border-box;
			}

			body {
				min-width: 320px;
				min-height: 100vh;
				min-height: 100svh;
				margin: 0;
				overflow-x: hidden;
				background:
					radial-gradient(circle at top left, rgb(255 0 89 / 32%), transparent 28rem),
					radial-gradient(circle at bottom right, rgb(0 213 255 / 28%), transparent 24rem),
					#050507;
			}

			button {
				border: 0;
				font: inherit;
				color: inherit;
				cursor: pointer;
			}

			button:disabled {
				cursor: wait;
				opacity: 0.7;
			}

			.app-shell {
				min-height: 100vh;
				min-height: 100svh;
				display: grid;
				grid-template-columns: minmax(0, 1fr);
				place-items: center;
				padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
			}

			.short-stage {
				position: relative;
				width: min(100%, 430px);
				height: min(860px, calc(100svh - 2rem));
				min-height: 620px;
				overflow: hidden;
				border: 1px solid rgb(255 255 255 / 14%);
				border-radius: 2rem;
				background: #111;
				box-shadow: 0 2rem 5rem rgb(0 0 0 / 45%);
				isolation: isolate;
			}

			.short-stage::before {
				position: absolute;
				inset: 0;
				z-index: -1;
				content: "";
				background:
					linear-gradient(180deg, rgb(0 0 0 / 64%), transparent 24%, transparent 64%, rgb(0 0 0 / 72%)),
					var(--reel-bg, linear-gradient(145deg, #ff005c, #6228d7 52%, #00d4ff));
				transition: background 220ms ease;
			}

			.short-stage::after {
				position: absolute;
				inset: 0;
				z-index: -1;
				content: "";
				background:
					radial-gradient(circle at 30% 18%, rgb(255 255 255 / 34%), transparent 8rem),
					repeating-linear-gradient(135deg, rgb(255 255 255 / 8%) 0 2px, transparent 2px 18px);
				mix-blend-mode: screen;
			}

			.top-bar,
			.bottom-panel,
			.action-rail,
			.nav-controls {
				position: absolute;
				z-index: 1;
			}

			.top-bar {
				top: 0;
				left: 0;
				right: 0;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 1rem;
				padding: 1.1rem 1.25rem;
				text-shadow: 0 0.2rem 1rem rgb(0 0 0 / 45%);
			}

			.brand {
				display: flex;
				align-items: center;
				gap: 0.6rem;
				font-weight: 800;
				letter-spacing: -0.03em;
			}

			.brand-mark {
				display: grid;
				width: 2rem;
				height: 2rem;
				place-items: center;
				border-radius: 0.75rem;
				background: linear-gradient(135deg, #ff003d, #ff8a00);
				box-shadow: 0 0.5rem 1.5rem rgb(255 0 61 / 36%);
			}

			.status-pill {
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				padding: 0.45rem 0.7rem;
				border: 1px solid rgb(255 255 255 / 18%);
				border-radius: 999px;
				background: rgb(0 0 0 / 28%);
				backdrop-filter: blur(12px);
				font-size: 0.85rem;
			}

			.status-dot {
				width: 0.55rem;
				height: 0.55rem;
				border-radius: 50%;
				background: #a3a3a3;
				box-shadow: 0 0 0.75rem currentColor;
			}

			.status-pill[data-state="online"] .status-dot {
				background: #27f58c;
				color: #27f58c;
			}

			.status-pill[data-state="offline"] .status-dot {
				background: #ff4f6d;
				color: #ff4f6d;
			}

			.reel-card {
				position: absolute;
				inset: 24% 1.25rem auto;
				padding: 1rem;
				border: 1px solid rgb(255 255 255 / 18%);
				border-radius: 1.5rem;
				background: rgb(0 0 0 / 24%);
				backdrop-filter: blur(18px);
				box-shadow: 0 1rem 3rem rgb(0 0 0 / 22%);
			}

			.reel-card p {
				margin: 0.35rem 0 0;
				color: rgb(255 255 255 / 76%);
				line-height: 1.5;
			}

			.reel-title {
				margin: 0;
				font-size: clamp(2.5rem, 11vw, 4.8rem);
				line-height: 0.9;
				letter-spacing: -0.08em;
			}

			.action-rail {
				right: 0.75rem;
				bottom: 9.25rem;
				display: grid;
				gap: 0.85rem;
				justify-items: center;
			}

			.action-button {
				display: grid;
				width: 3.25rem;
				height: 3.25rem;
				place-items: center;
				border: 1px solid rgb(255 255 255 / 18%);
				border-radius: 50%;
				background: rgb(0 0 0 / 32%);
				backdrop-filter: blur(10px);
				font-size: 1.35rem;
				transition: transform 160ms ease, background 160ms ease;
			}

			.action-button:hover,
			.action-button:focus-visible {
				background: rgb(255 255 255 / 22%);
				transform: translateY(-2px) scale(1.03);
			}

			.action-count {
				font-size: 0.75rem;
				font-weight: 800;
				text-shadow: 0 0.2rem 0.8rem rgb(0 0 0 / 70%);
			}

			.bottom-panel {
				left: 0;
				right: 4.75rem;
				bottom: 0;
				padding: 1.25rem;
				text-shadow: 0 0.2rem 1rem rgb(0 0 0 / 55%);
			}

			.handle {
				display: flex;
				align-items: center;
				gap: 0.55rem;
				margin-bottom: 0.55rem;
				font-weight: 800;
			}

			.avatar {
				display: grid;
				width: 2.25rem;
				height: 2.25rem;
				place-items: center;
				border: 2px solid #fff;
				border-radius: 50%;
				background: linear-gradient(135deg, #00d4ff, #ff005c);
			}

			.caption,
			.meta-row {
				margin: 0;
				line-height: 1.45;
			}

			.caption {
				font-weight: 600;
			}

			.meta-row {
				margin-top: 0.65rem;
				color: rgb(255 255 255 / 76%);
				font-size: 0.9rem;
			}

			.uuid-chip {
				display: inline-block;
				max-width: 100%;
				padding: 0.35rem 0.5rem;
				border: 1px solid rgb(255 255 255 / 18%);
				border-radius: 0.7rem;
				background: rgb(0 0 0 / 30%);
				font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
				word-break: break-all;
			}

			.nav-controls {
				left: 50%;
				bottom: 1rem;
				display: flex;
				gap: 0.6rem;
				transform: translateX(-50%);
			}

			.nav-button {
				padding: 0.75rem 0.95rem;
				border: 1px solid rgb(255 255 255 / 20%);
				border-radius: 999px;
				background: rgb(0 0 0 / 38%);
				backdrop-filter: blur(12px);
				font-weight: 800;
				box-shadow: 0 0.75rem 1.5rem rgb(0 0 0 / 18%);
			}

			.toast {
				position: absolute;
				left: 1rem;
				right: 1rem;
				top: 4.75rem;
				z-index: 2;
				padding: 0.8rem 1rem;
				border: 1px solid rgb(255 255 255 / 18%);
				border-radius: 1rem;
				background: rgb(0 0 0 / 58%);
				backdrop-filter: blur(12px);
				box-shadow: 0 1rem 3rem rgb(0 0 0 / 20%);
				transform: translateY(-0.5rem);
				opacity: 0;
				pointer-events: none;
				transition: opacity 180ms ease, transform 180ms ease;
			}

			.toast[data-visible="true"] {
				transform: translateY(0);
				opacity: 1;
			}

			.visually-hidden {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			@media (max-width: 480px) {
				.app-shell {
					padding: 0;
				}

				.short-stage {
					width: 100vw;
					height: 100svh;
					min-height: 100svh;
					border: 0;
					border-radius: 0;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				*,
				*::before,
				*::after {
					scroll-behavior: auto !important;
					transition-duration: 0.01ms !important;
					animation-duration: 0.01ms !important;
					animation-iteration-count: 1 !important;
				}
			}
		</style>
	</head>
	<body>
		<main class="app-shell">
			<section class="short-stage" id="shortStage" aria-label="Reels backend shorts demo">
				<header class="top-bar">
					<div class="brand" aria-label="Reels Backend">
						<span class="brand-mark" aria-hidden="true">▶</span>
						<span>Reels</span>
					</div>
					<div class="status-pill" id="statusPill" data-state="checking" role="status" aria-live="polite">
						<span class="status-dot" aria-hidden="true"></span>
						<span id="statusText">Checking API</span>
					</div>
				</header>

				<div class="toast" id="toast" role="status" aria-live="polite"></div>

				<article class="reel-card" aria-live="polite">
					<p>Now playing</p>
					<h1 class="reel-title" id="reelTitle">Loading…</h1>
					<p id="reelDescription">Preparing the feed.</p>
				</article>

				<aside class="action-rail" aria-label="Reel actions">
					<div>
						<button class="action-button" id="likeButton" type="button" aria-pressed="false">
							<span aria-hidden="true">♡</span>
							<span class="visually-hidden">Like this reel</span>
						</button>
						<div class="action-count" id="likeCount">12.4K</div>
					</div>
					<div>
						<button class="action-button" type="button" data-toast="Comments are coming soon">
							<span aria-hidden="true">💬</span>
							<span class="visually-hidden">Open comments</span>
						</button>
						<div class="action-count">842</div>
					</div>
					<div>
						<button class="action-button" type="button" data-toast="Share link copied">
							<span aria-hidden="true">↗</span>
							<span class="visually-hidden">Share reel</span>
						</button>
						<div class="action-count">Share</div>
					</div>
				</aside>

				<section class="bottom-panel" aria-label="Current reel details">
					<div class="handle">
						<span class="avatar" aria-hidden="true">RB</span>
						<span id="creatorHandle">@reels-backend</span>
					</div>
					<p class="caption" id="caption">Fetching the first backend-generated reel token…</p>
					<p class="meta-row">
						<span class="uuid-chip" id="uuidChip">Waiting for /api/random</span>
					</p>
				</section>

				<nav class="nav-controls" aria-label="Reel navigation">
					<button class="nav-button" id="previousButton" type="button">↑ Prev</button>
					<button class="nav-button" id="nextButton" type="button">Next ↓</button>
				</nav>
			</section>
		</main>

		<script>
			(() => {
				const reels = [
					{
						title: 'Edge Fast',
						description: 'A tiny Worker response, styled like a vertical reel.',
						caption: 'Serving API moments from the edge ⚡',
						creator: '@edge-director',
						background: 'linear-gradient(145deg, #ff005c, #6228d7 52%, #00d4ff)',
						likes: '12.4K',
					},
					{
						title: 'UUID Drop',
						description: 'Each tap refreshes the backend-generated token.',
						caption: 'Fresh IDs for fresh clips 🎬',
						creator: '@uuid-studio',
						background: 'linear-gradient(145deg, #00c6ff, #0072ff 48%, #7f00ff)',
						likes: '8.8K',
					},
					{
						title: 'API Beat',
						description: 'Health checks keep the feed status visible.',
						caption: 'If the API is online, the show goes on ✅',
						creator: '@worker-wave',
						background: 'linear-gradient(145deg, #f7971e, #ffd200 46%, #ff0844)',
						likes: '21K',
					},
				];

				const selectors = {
					caption: '#caption',
					creatorHandle: '#creatorHandle',
					likeButton: '#likeButton',
					likeCount: '#likeCount',
					nextButton: '#nextButton',
					previousButton: '#previousButton',
					reelDescription: '#reelDescription',
					reelTitle: '#reelTitle',
					shortStage: '#shortStage',
					statusPill: '#statusPill',
					statusText: '#statusText',
					toast: '#toast',
					uuidChip: '#uuidChip',
				};

				const elements = Object.fromEntries(
					Object.entries(selectors).map(([key, selector]) => [
						key,
						document.querySelector(selector),
					])
				);

				const missingElement = Object.entries(elements).find(([, element]) => !element);
				if (missingElement) {
					console.error(`Missing required UI element: ${missingElement[0]}`);
					return;
				}

				let currentIndex = 0;
				let liked = false;
				let toastTimer;
				let currentRequest;

				function setStatus(state, message) {
					elements.statusPill.dataset.state = state;
					elements.statusText.textContent = message;
				}

				function showToast(message) {
					window.clearTimeout(toastTimer);
					elements.toast.textContent = message;
					elements.toast.dataset.visible = 'true';
					toastTimer = window.setTimeout(() => {
						elements.toast.dataset.visible = 'false';
					}, 2200);
				}

				async function readJson(response) {
					if (!response.ok) {
						throw new Error(`Request failed with ${response.status}`);
					}

					return response.json();
				}

				function renderReel() {
					const reel = reels[currentIndex];

					elements.shortStage.style.setProperty('--reel-bg', reel.background);
					elements.reelTitle.textContent = reel.title;
					elements.reelDescription.textContent = reel.description;
					elements.creatorHandle.textContent = reel.creator;
					elements.caption.textContent = reel.caption;
					elements.likeCount.textContent = reel.likes;
					elements.likeButton.setAttribute('aria-pressed', String(liked));
					elements.likeButton.firstElementChild.textContent = liked ? '♥' : '♡';
				}

				async function refreshToken() {
					currentRequest?.abort();
					const requestController = new AbortController();
					currentRequest = requestController;
					elements.uuidChip.textContent = 'Loading /api/random…';
					elements.nextButton.disabled = true;
					elements.previousButton.disabled = true;

					try {
						const { id } = await fetch('/api/random', {
							signal: requestController.signal,
						}).then(readJson);

						if (typeof id !== 'string' || id.length === 0) {
							throw new Error('API returned an invalid reel token');
						}

						elements.uuidChip.textContent = id;
						setStatus('online', 'API online');
					} catch (error) {
						if (error instanceof DOMException && error.name === 'AbortError') {
							return;
						}

						const message = error instanceof Error ? error.message : 'Unknown API error';
						elements.uuidChip.textContent = 'Unable to load reel token';
						setStatus('offline', 'API offline');
						showToast(message);
					} finally {
						if (currentRequest === requestController && !requestController.signal.aborted) {
							elements.nextButton.disabled = false;
							elements.previousButton.disabled = false;
						}
					}
				}

				function move(delta) {
					currentIndex = (currentIndex + delta + reels.length) % reels.length;
					liked = false;
					renderReel();
					refreshToken();
				}

				elements.likeButton.addEventListener('click', () => {
					liked = !liked;
					renderReel();
					showToast(liked ? 'Added to favorites' : 'Removed from favorites');
				});

				document.querySelectorAll('[data-toast]').forEach((button) => {
					button.addEventListener('click', () => {
						showToast(button.dataset.toast || 'Action unavailable');
					});
				});

				elements.nextButton.addEventListener('click', () => move(1));
				elements.previousButton.addEventListener('click', () => move(-1));

				window.addEventListener('keydown', (event) => {
					if (event.key === 'ArrowDown') {
						move(1);
					}

					if (event.key === 'ArrowUp') {
						move(-1);
					}
				});

				renderReel();
				refreshToken();
			})();
		</script>
	</body>
</html>
